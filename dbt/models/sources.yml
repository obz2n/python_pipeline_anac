            description: "Nome do aeródromo de destino."
          - name: nm_municipio_destino
            description: "Nome do município de destino."
          - name: sg_uf_destino
            description: "Sigla da Unidade Federativa de destino."
          - name: nm_regiao_destino
            description: "Nome da região de destino."
          - name: nm_pais_destino
            description: "Nome do país de destino."
          - name: nm_continente_destino
            description: "Nome do continente de destino."
          - name: nr_escala_destino
            description: "Sequência de escala de destino. É o número correspondente ao aeródromo de destino da etapa, considerando a numeração sequencial dos aeródromos percorridos sob um mesmo voo."
          - name: cd_cotran
            description: "Caractere que representa o Cotran (Código de Transporte). O Cotran é utilizado para informar o tipo de desembarque realizado pelo objeto de transporte (passageiro, carga ou correio), informando sobre a realização ou não de conexões"
          - name: ds_cotran
            description: "Descrição do Cotran (Código de Transporte)."
          - name: nr_passag_pagos
            description: "Número de passageiros que ocupam assentos comercializados ao público e que geram receita, com a compra de assentos, para a empresa de transporte aéreo."
          - name: nr_passag_gratis
            description: "Número de passageiros que ocupam assentos comercializados ao público mas não geram receita, com a compra de assentos, para a empresa de transporte aéreo."
          - name: kg_bagagem_livre
            description: "Bagagem franqueada. É toda bagagem que não é considerada como excesso, expressa em quilogramas."
          - name: kg_bagagem_excesso
            description: "Excesso de bagagem. É a quantidade total de bagagem que excede o limite de peso acordado entre a empresa aérea e o passageiro (adquirido antes ou depois da compra do bilhete), verificada no momento do despacho, expressa em quilogramas."
          - name: kg_carga_paga
            description: "Carga paga. É a quantidade total, expressa em quilogramas, de todos os bens que tenham sido transportados na aeronave, exceto correio e bagagem, e tenham gerado receita direta ou indireta para a empresa aérea."
          - name: kg_carga_gratis
            description: "Quantidade total, expressa em quilogramas, de todos os bens que tenham sido transportados na aeronave, exceto correio e bagagem, e não tenha gerado receitas diretas ou indiretas para a empresa aérea."
          - name: kg_correio
            description: "Quantidade, expressa em quilogramas, de objetos transportados para atender aos operadores designados oficialmente pelo país para operar serviços postais e cumprir com as obrigações associadas decorrentes dos Atos da Universal Postal Union (UPU)."
          - name: id_arquivo
            description: "Código identificador do arquivo de dados enviado ao sistema."
          - name: nm_arquivo
            description: "Nome do arquivo enviado ao sistema."
          - name: nr_linha
            description: "Número da linha do arquivo na qual estão contidos os dados de cada etapa básica."
          - name: dt_sistema
            description: "Data em que as informações foram registradas no sistema."
