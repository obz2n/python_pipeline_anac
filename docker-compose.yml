---
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # CORRIGIDO: senha com caracteres especiais (@, !) resolvida com
    # AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_SECRET em vez de URL inline.
    # Usamos variáveis separadas que o SQLAlchemy monta internamente.
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/airflow"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-FEqz77TJ0jBQq0Vvu2GhPr_hO0jL_HfhXCZI8K3NWHQ=}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__CORE__MIN_LOG_LEVEL: "INFO"
    SCRIPTS_DIR: /opt/airflow/scripts
    DATA_PATH:   /opt/airflow/data
    DBT_PROJECT_DIR:  /opt/airflow/dbt
    DBT_PROFILES_DIR: /opt/airflow/dbt
    POSTGRES_HOST:     postgres
    POSTGRES_PORT:     "5432"
    POSTGRES_DB:       ${POSTGRES_DB}
    POSTGRES_USER:     ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - anac_net

services:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anac_net

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        python -c "
        import psycopg2, os, sys
        try:
            conn = psycopg2.connect(
                host='postgres', port=5432,
                user=os.environ['POSTGRES_USER'],
                password=os.environ['POSTGRES_PASSWORD'],
                dbname='postgres'
            )
            conn.autocommit = True
            cur = conn.cursor()
            cur.execute(\"SELECT 1 FROM pg_database WHERE datname='airflow'\")
            if not cur.fetchone():
                cur.execute('CREATE DATABASE airflow')
                print('Banco airflow criado.')
            else:
                print('Banco airflow ja existe.')
            conn.close()
        except Exception as e:
            print(f'Erro: {e}', file=sys.stderr)
            sys.exit(1)
        "
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin123 \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@anac.local 2>/dev/null || echo "Usuario admin ja existe."
        airflow connections add postgres_anac \
          --conn-type postgres \
          --conn-host postgres \
          --conn-login ${POSTGRES_USER} \
          --conn-password ${POSTGRES_PASSWORD} \
          --conn-schema bronze \
          --conn-port 5432 \
          --conn-extra '{"sslmode": "disable"}' 2>/dev/null \
          || echo "Connection postgres_anac ja existe."
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: unless-stopped
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:

networks:
  anac_net:
    driver: bridge
