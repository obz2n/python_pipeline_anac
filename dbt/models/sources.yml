            description: "Sequência de escala de destino. É o número correspondente ao aeródromo de destino da etapa, considerando a numeração sequencial dos aeródromos percorridos sob um mesmo voo."
          - name: lt_combustivel
            description: "Quantidade de combustível consumida, expressa em litros."
          - name: nr_assentos_ofertados
            description: "Número de assentos disponíveis na etapa do voo."
          - name: kg_payload
            description: "Capacidade Payload, expressa em quilogramas."
          - name: km_distancia
            description: "Distância, expressa em quilômetros, entre os aeródromos de origem e destino da etapa, considerando a curvatura do planeta terra."
          - name: nr_passag_pagos
            description: "Número de passageiros que ocupam assentos comercializados ao público e que geram receita, com a compra de assentos, para a empresa de transporte aéreo."
          - name: nr_passag_gratis
            description: "Número de passageiros que ocupam assentos comercializados ao público, mas não geram receita, com a compra de assentos, para a empresa de transporte aéreo."
          - name: kg_bagagem_livre
            description: "Bagagem franqueada. É toda bagagem que não é considerada como excesso, expressa em quilogramas."
          - name: kg_bagagem_excesso
            description: "Excesso de bagagem. É a quantidade total de bagagem que excede o limite de peso acordado entre a empresa aérea e o passageiro (adquirido antes ou depois da compra do bilhete), verificada no momento do despacho, expressa em quilogramas."
          - name: kg_carga_paga
            description: "Carga paga. É a quantidade total, expressa em quilogramas, de todos os bens que tenham sido transportados na aeronave, exceto correio e bagagem, e tenham gerado receita direta ou indireta para a empresa aérea."
          - name: kg_carga_gratis
            description: "Quantidade total, expressa em quilogramas, de todos os bens que tenham sido transportados na aeronave, exceto correio e bagagem, e não tenha gerado receitas diretas ou indiretas para a empresa aérea."
          - name: kg_correio
            description: "Quantidade, expressa em quilogramas, de objetos transportados para atender aos operadores designados oficialmente pelo país para operar serviços postais e cumprir com as obrigações associadas decorrentes dos Atos da Universal Postal Union (UPU)"
          - name: nr_decolagem
            description: "Número de decolagens."
          - name: nr_horas_voadas
            description: "Número de horas voadas."
          - name: kg_peso
            description: "Refere-se ao peso total carregado pela aeronave, calculado pela soma de carga, correio, passageiros e bagagem, expressos em kg. O peso dos passageiros transportados é calculado multiplicando-se a quantidade total de passageiros por 75, para empresas brasileiras. No caso das empresas estrangeiras, que não enviam dados de bagagem à ANAC, o peso total de passageiros e bagagens é estimado multiplicando-se a quantidade total de passageiros por 90."
          - name: nr_velocidade_media
            description: "Velocidade média do voo, calculada a partir da distância e da duração do voo, expressa em km/h."
          - name: nr_pax_gratis_km
            description: "Representa, para cada etapa básica, o produto entre a quantidade de passageiros grátis e a distância da etapa."
          - name: nr_carga_paga_km
            description: "Refere-se ao produto entre a quantidade de carga paga (kg) e a distância da etapa básica (km)."
          - name: nr_carga_gratis_km
            description: "Refere-se ao produto entre a quantidade de carga grátis (kg) e a distância da etapa básica (km)."
          - name: nr_correio_km
            description: "Refere-se ao produto entre a quantidade de correio (kg) e a distância da etapa básica (km)."
          - name: nr_bagagem_paga_km
            description: "Refere-se ao produto entre a quantidade de bagagem paga (kg) e a distância da etapa básica (km)."
          - name: nr_bagagem_gratis_km
            description: "Refere-se ao produto entre a quantidade de bagagem grátis (kg) e a distância da etapa básica (km)."
          - name: nr_ask
            description: "Refere-se ao volume de Assentos Quilômetros Oferecidos (Available Seat Kilometer). É calculado, em cada etapa básica, pelo produto entre o número de assentos oferecidos e a distância da etapa."
          - name: nr_rpk
            description: "Refere-se ao volume de Passageiros Quilômetros Transportados (Revenue Passenger Kilometer). É calculado, em cada etapa básica, pelo produto entre o número de passageiros pagos e a distância da etapa."
          - name: nr_atk
            description: "Refere-se ao volume de Toneladas Quilômetros Oferecidas (Available Tonne Kilometer), expresso em (ton x km). É calculado, em cada etapa básica, pelo produto entre a Capacidade Payload (kg) e a distância da etapa, dividido por 1000."
          - name: nr_rtk
            description: "Refere-se ao volume de Toneladas Quilômetros Transportadas (Revenue Tonne Kilometer), expresso em (ton x km). É calculado, em cada etapa básica, pelo produto entre a quantidade, expressa em quilogramas, de passageiros, bagagem, carga e correio pagos transportada e a distância da etapa, dividido por 1000. Cada passageiro possui o peso estimado de 75kg, para empresas brasileiras. No caso das empresas estrangeiras, que não enviam dados de bagagem à ANAC, o peso total de passageiros e bagagens é estimado multiplicando-se a quantidade total de passageiros por 90."
          - name: id_arquivo
            description: "Código identificador do arquivo de dados enviado ao sistema."
          - name: nm_arquivo
            description: "Nome do arquivo enviado ao sistema."
          - name: nr_linha
            description: "Número da linha do arquivo na qual estão contidos os dados de cada etapa básica."
          - name: dt_sistema
            description: "Data em que as informações foram registradas no sistema."
          - name: Etapa Combinada (On flight origin and destination - OFOD)
            description: "As etapas combinadas identificam os pares de origem, onde ocorreu o embarque do objeto de transporte, e destino, onde ocorreu o desembarque do objeto de transporte, independentemente da existência de aeródromos intermediários, atendidos por determinado voo. É a etapa de voo vista com foco no objeto de transporte (pessoas e/ou cargas), com base no embarque e no desembarque nos aeródromos relacionados. Os dados estatísticos da etapa combinada informam a origem e destino dos passageiros e cargas transportadas no voo, independentemente das escalas realizadas."
          - name: id_combinada
            description: "Código numérico identificador da etapa combinada no sistema"
